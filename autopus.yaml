mode: full
project_name: karyogram
platforms:
    - claude-code
    - codex
    - gemini-cli
stack: python
language:
    comments: en
    commits: en
    ai_responses: en
architecture:
    auto_generate: true
    enforce: true
    layers: []
lore:
    enabled: true
    auto_inject: false
    required_trailers:
        - Constraint
    stale_threshold_days: 90
spec:
    id_format: SPEC-{DOMAIN}-{NUMBER}
    ears_types:
        - ubiquitous
        - event-driven
        - unwanted
        - optional
        - complex
    review_gate:
        enabled: true
        strategy: debate
        providers: [claude, codex, gemini]
        judge: claude
        max_revisions: 2
        auto_collect_context: true
        context_max_lines: 500
        verdict_threshold: 0.67
        doc_context_max_lines: 200
methodology:
    mode: tdd
    enforce: true
    review_gate: true
router:
    strategy: balanced
    tiers:
        economy: claude-sonnet-4-6
        premium: claude-opus-4-7
        standard: claude-sonnet-4-6
    categories:
        deep: premium
        git: economy
        quick: economy
        ultrabrain: premium
        visual: standard
        writing: standard
    intent_gate: true
hooks:
    pre_commit_arch: true
    pre_commit_lore: true
    react_ci_failure: true
    react_review: true
session:
    handoff_enabled: true
    continue_file: .auto-continue.md
    max_context_tokens: 2000
orchestra:
    enabled: true
    default_strategy: consensus
    timeout_seconds: 240
    judge: claude
    providers:
        claude:
            binary: claude
            args: [--print, --model, opus, --effort, high]
            pane_args: [--print, --model, opus, --effort, high]
            subprocess:
                timeout: 480
        codex:
            binary: codex
            args: [exec, --sandbox, workspace-write, -m, gpt-5.5]
            pane_args: [-m, gpt-5.5]
            subprocess:
                schema_flag: --output-schema
                timeout: 420
        gemini:
            binary: gemini
            args: [-m, gemini-2.5-flash, -p, "ping"]
            pane_args: [-m, gemini-2.5-flash]
    commands:
        brainstorm:
            strategy: debate
            providers: [claude, codex, gemini]
        plan:
            strategy: consensus
            providers: [claude, codex, gemini]
        review:
            strategy: debate
            providers: [claude, codex, gemini]
        secure:
            strategy: consensus
            providers: [claude, codex, gemini]
quality:
    default: balanced
    presets:
        balanced:
            description: 핵심 분석은 Opus, 기본 작업은 Sonnet. Haiku 미사용.
            agents:
                architect: opus
                debugger: sonnet
                devops: sonnet
                executor: sonnet
                explorer: sonnet
                planner: opus
                reviewer: sonnet
                security-auditor: opus
                spec-writer: opus
                tester: sonnet
                validator: sonnet
        ultra:
            description: 모든 에이전트를 Opus로 실행. 최고 품질.
            agents:
                architect: opus
                debugger: opus
                devops: opus
                executor: opus
                explorer: opus
                planner: opus
                reviewer: opus
                security-auditor: opus
                spec-writer: opus
                tester: opus
                validator: opus
skills:
    auto_activate: true
    max_active_skills: 5
    category_weights:
        agentic: 15
        quality: 20
        security: 30
        workflow: 10
verify:
    enabled: true
    default_viewport: desktop
    auto_fix: true
    max_fix_attempts: 2
design:
    enabled: true
    max_context_lines: 80
    inject_on_review: true
    inject_on_verify: true
    external_imports: false
context:
    signature_map: true
features:
    cc21:
        enabled: false
        task_created_mode: warn
        monitor_pattern_timeout_ms: 30000
usage_profile: developer
